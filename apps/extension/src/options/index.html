<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BugCatcher Options</title>
    <style>
      body {
        margin: 24px;
        font-family: 'Segoe UI', Tahoma, sans-serif;
        max-width: 760px;
      }
      h1 {
        margin-bottom: 16px;
      }
      form {
        display: grid;
        gap: 12px;
      }
      label {
        font-weight: 600;
      }
      input[type='text'],
      input[type='password'] {
        width: 100%;
        padding: 8px;
        border: 1px solid #c8c8c8;
        border-radius: 6px;
      }
      .row {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      select,
      input[type='number'] {
        width: 100%;
        padding: 8px;
        border: 1px solid #c8c8c8;
        border-radius: 6px;
      }
      .section {
        border: 1px solid #e0e0e0;
        border-radius: 8px;
        padding: 12px;
      }
      .section h2 {
        margin: 0 0 10px;
        font-size: 16px;
      }
      button {
        width: fit-content;
        padding: 10px 14px;
        border: 0;
        border-radius: 8px;
        background: #0f6cbd;
        color: white;
        font-weight: 600;
      }
      #status {
        min-height: 18px;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <h1>BugCatcher Options</h1>
    <form id="configForm">
      <div class="section">
        <h2>Capture Settings</h2>
        <div>
          <label for="apiBaseUrl">API Base URL</label>
          <input id="apiBaseUrl" type="text" placeholder="http://localhost:3001/api/v1" />
        </div>
        <div>
          <label for="projectId">Project ID</label>
          <input id="projectId" type="text" />
        </div>
        <div>
          <label for="projectKey">Project Key</label>
          <input id="projectKey" type="password" />
        </div>
        <label class="row"><input id="captureNetwork" type="checkbox" /> Capture network</label>
        <label class="row"><input id="captureConsole" type="checkbox" /> Capture console</label>
        <label class="row"><input id="captureErrors" type="checkbox" /> Capture errors</label>
      </div>

      <div class="section">
        <h2>AI Analysis (BYOM)</h2>
        <label class="row"><input id="aiEnabled" type="checkbox" /> Enable AI analysis</label>
        <div>
          <label for="aiProvider">Provider</label>
          <select id="aiProvider">
            <option value="none">None</option>
            <option value="openai">OpenAI Compatible</option>
            <option value="ollama">Ollama</option>
            <option value="custom">Custom Endpoint</option>
          </select>
        </div>
        <div>
          <label for="aiModel">Model</label>
          <input id="aiModel" type="text" placeholder="gpt-4o-mini / llama3.1 / custom model" />
        </div>
        <div>
          <label for="aiBaseUrl">Provider Base URL (optional for OpenAI default)</label>
          <input id="aiBaseUrl" type="text" placeholder="https://api.openai.com/v1 or http://localhost:11434" />
        </div>
        <div>
          <label for="aiApiKey">Provider API Key</label>
          <input id="aiApiKey" type="password" placeholder="Required for OpenAI/Custom" />
        </div>
        <div>
          <label for="aiTemperature">Temperature (0-1)</label>
          <input id="aiTemperature" type="number" min="0" max="1" step="0.1" />
        </div>
        <div>
          <label for="aiMaxTokens">Max Tokens (64-4096)</label>
          <input id="aiMaxTokens" type="number" min="64" max="4096" step="1" />
        </div>
        <label class="row"><input id="aiCodeContextEnabled" type="checkbox" /> Enable code-context analysis</label>
        <label class="row"><input id="aiEmbeddingsEnabled" type="checkbox" /> Embeddings available for repository lookup</label>
        <div>
          <label for="aiRepositoryRef">Repository Reference</label>
          <input id="aiRepositoryRef" type="text" placeholder="owner/repo or internal repository identifier" />
        </div>
        <div>
          <label for="aiMaxCodeContextFiles">Max Code Context Files (1-12)</label>
          <input id="aiMaxCodeContextFiles" type="number" min="1" max="12" step="1" />
        </div>
      </div>

      <button type="submit">Save</button>
      <div id="status"></div>
    </form>
    <script type="module" src="./options.ts"></script>
  </body>
</html>
