<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Session Details</title>
    <style>
      :root {
        color-scheme: light;
      }
      body {
        margin: 0;
        padding: 20px;
        font-family: 'Segoe UI', Tahoma, sans-serif;
        background: #f6f8fa;
        color: #0f1419;
      }
      h1 {
        margin: 0 0 12px;
        font-size: 20px;
        font-weight: 700;
      }
      .card {
        background: #fff;
        border: 1px solid #d0d7de;
        border-radius: 10px;
        padding: 16px;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.04);
      }
      .status {
        margin-top: 8px;
        padding: 10px;
        border-radius: 8px;
        font-size: 13px;
      }
      .status.info { background: #e7f3ff; color: #0b4f8a; border: 1px solid #bfdcff; }
      .status.error { background: #ffeef0; color: #86181d; border: 1px solid #ffd1d7; }
      .status.success { background: #e6ffed; color: #006d32; border: 1px solid #b6f0c2; }
      form {
        display: flex;
        gap: 8px;
        margin: 12px 0;
      }
      input[type='text'] {
        flex: 1;
        padding: 10px;
        border: 1px solid #d0d7de;
        border-radius: 8px;
        font-size: 14px;
      }
      button {
        padding: 10px 14px;
        border: none;
        border-radius: 8px;
        background: #0f6cbd;
        color: #fff;
        font-weight: 600;
        cursor: pointer;
      }
      button:disabled { opacity: 0.6; cursor: not-allowed; }
      .meta {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 8px;
        margin-top: 8px;
        font-size: 13px;
      }
      .meta div { background: #f6f8fa; padding: 8px; border-radius: 6px; border: 1px solid #e5e7eb; }
      .events {
        margin-top: 12px;
      }
      .event-row {
        padding: 10px;
        border-bottom: 1px solid #e5e7eb;
        display: grid;
        grid-template-columns: 120px 1fr;
        gap: 12px;
        align-items: flex-start;
      }
      .event-row:last-child { border-bottom: 0; }
      .badge {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 999px;
        font-size: 11px;
        font-weight: 700;
      }
      .badge.console { background: #eef2ff; color: #3730a3; }
      .badge.network { background: #ecfeff; color: #0e7490; }
      .badge.state { background: #fef9c3; color: #92400e; }
      .badge.error { background: #fee2e2; color: #991b1b; }
      .timestamp { font-family: 'Consolas', 'Courier New', monospace; font-size: 12px; color: #4b5563; }
      .event-body { font-size: 13px; color: #111827; }
      .payload {
        margin-top: 6px;
        padding: 8px;
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 6px;
      }
      .payload summary {
        cursor: pointer;
        font-weight: 600;
        color: #0f4fbf;
        list-style: none;
      }
      .payload summary::-webkit-details-marker { display: none; }
      .payload pre {
        margin: 8px 0 0;
        font-family: 'Consolas', 'Courier New', monospace;
        font-size: 12px;
        white-space: pre-wrap;
        word-break: break-word;
        color: #0f172a;
      }
      .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 12px; }
      .thumb { width: 72px; height: 48px; border: 1px solid #d0d7de; border-radius: 6px; overflow: hidden; flex-shrink: 0; cursor: pointer; }
      .thumb img { width: 100%; height: 100%; object-fit: cover; display:block; }
      .thumb.active { outline: 2px solid #0f6cbd; }
      .empty { padding: 12px; text-align: center; color: #4b5563; }
    </style>
  </head>
  <body>
    <h1>Session Details</h1>
    <div id="status" class="status info">Enter a session id or open from the popup list.</div>
    <form id="sessionForm">
      <input id="sessionIdInput" type="text" placeholder="Session ID" aria-label="Session ID" />
      <button id="loadButton" type="submit">Load</button>
    </form>
    <div id="sessionCard" class="card" style="display:none;">
      <div class="meta" id="sessionMeta"></div>
      <div class="grid" style="margin-top:12px; gap:12px;">
        <div class="card" style="padding:12px;">
          <h3 style="margin:0 0 8px;">Screenshot</h3>
          <div id="screenshotContainer" style="min-height:140px; display:flex; align-items:center; justify-content:center; background:#0b0f14; border-radius:8px; overflow:hidden;">
            <img id="screenshotImage" alt="Captured screenshot" style="width:100%; height:auto; display:none;" />
            <div id="screenshotEmpty" class="empty" style="color:#cbd5f5;">No screenshot uploaded.</div>
          </div>
        </div>
        <div class="card" style="padding:12px;">
          <h3 style="margin:0 0 8px;">Replay</h3>
          <div style="display:flex; flex-direction:column; gap:8px;">
            <video id="videoPlayer" controls style="width:100%; max-height:320px; border-radius:8px; background:#000;" preload="metadata"></video>
            <div id="domSnapshotContainer" style="display:flex; gap:8px; overflow-x:auto;"></div>
            <div style="display:flex; align-items:center; gap:8px;">
              <input id="timeline" type="range" min="0" max="100" value="0" style="flex:1;" />
              <span id="timelineReadout" class="timestamp">0ms</span>
            </div>
          </div>
        </div>
      </div>
      <div class="events">
        <div style="display:flex; align-items:center; justify-content:space-between; gap:12px; margin: 12px 0 8px; flex-wrap:wrap;">
          <h3 style="margin:0;">Events</h3>
          <div style="display:flex; flex-direction:column; gap:6px; flex:1;">
            <div id="eventFilters" style="display:flex; gap:8px; flex-wrap:wrap; justify-content:flex-end;"></div>
            <div id="counts" style="font-size:12px; color:#4b5563; text-align:right;"></div>
          </div>
        </div>
        <div id="eventsList" class="card" style="padding:0;"></div>
      </div>
    </div>
    <script type="module" src="./index.ts"></script>
  </body>
</html>
