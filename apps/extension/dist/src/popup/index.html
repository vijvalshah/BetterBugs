<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BugCatcher</title>
    <style>
      :root {
        --bg-primary: #09090b;
        --bg-card: #18181b;
        --bg-secondary: #27272a;
        --border: #27272a;
        --text-primary: #fafafa;
        --text-secondary: #a1a1aa;
        --text-muted: #71717a;
        --primary: #3b82f6;
        --primary-hover: #2563eb;
        --destructive: #ef4444;
        --success: #22c55e;
        --warning: #f59e0b;
      }

      body {
        margin: 0;
        padding: 16px;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        width: 420px;
        background: var(--bg-primary);
        color: var(--text-primary);
        box-sizing: border-box;
      }

      h1 {
        margin: 0 0 16px;
        font-size: 18px;
        font-weight: 600;
        color: var(--text-primary);
      }

      button {
        width: 100%;
        padding: 10px 16px;
        border: 0;
        border-radius: 8px;
        background: var(--primary);
        color: white;
        font-weight: 500;
        font-size: 13px;
        cursor: pointer;
        transition: background 0.15s;
      }

      button:hover:not(:disabled) {
        background: var(--primary-hover);
      }

      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .status {
        margin-top: 10px;
        font-size: 12px;
        color: var(--text-muted);
        min-height: 18px;
      }

      .capture-state {
        margin-bottom: 12px;
        padding: 12px;
        border-radius: 8px;
        background: var(--bg-card);
        border: 1px solid var(--border);
      }

      .capture-state__label {
        font-weight: 600;
        margin-bottom: 6px;
        color: var(--text-primary);
      }

      .capture-state__info {
        font-size: 11px;
        color: var(--text-secondary);
        margin-bottom: 8px;
      }

      .capture-actions {
        display: flex;
        gap: 8px;
      }

      .capture-actions button {
        flex: 1;
      }

      .capture-start {
        background: var(--destructive);
      }

      .capture-start:hover:not(:disabled) {
        background: #dc2626;
      }

      .capture-stop {
        background: var(--success);
      }

      .capture-stop:hover:not(:disabled) {
        background: #16a34a;
      }

      .screenshot-preview {
        margin-top: 10px;
        padding: 12px;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: var(--bg-card);
        font-size: 11px;
        color: var(--text-secondary);
      }

      .screenshot-preview img {
        width: 100%;
        max-height: 180px;
        object-fit: contain;
        border-radius: 6px;
        border: 1px solid var(--border);
        background: #000;
      }

      .config {
        margin-top: 10px;
        font-size: 12px;
        color: var(--text-secondary);
      }

      .triage {
        margin-top: 16px;
        padding-top: 16px;
        border-top: 1px solid var(--border);
      }

      .row {
        display: flex;
        gap: 8px;
        margin-top: 8px;
      }

      .row > * {
        flex: 1;
      }

      input,
      select {
        width: 100%;
        box-sizing: border-box;
        padding: 8px 12px;
        border-radius: 6px;
        border: 1px solid var(--border);
        background: var(--bg-card);
        color: var(--text-primary);
        font-size: 12px;
        outline: none;
      }

      input:focus,
      select:focus {
        border-color: var(--primary);
      }

      input::placeholder {
        color: var(--text-muted);
      }

      .session-list {
        margin-top: 12px;
        max-height: 280px;
        overflow: auto;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--bg-card);
      }

      .session-item {
        padding: 10px;
        border-bottom: 1px solid var(--border);
        font-size: 12px;
        border-left: 3px solid var(--border);
        background: var(--bg-card);
        transition: background 0.15s;
      }

      .session-item:hover {
        background: var(--bg-secondary);
      }

      .session-item.severity-critical {
        border-left-color: #ef4444;
      }

      .session-item.severity-high {
        border-left-color: #f97316;
      }

      .session-item.severity-medium {
        border-left-color: #eab308;
      }

      .session-item.severity-low {
        border-left-color: #22c55e;
      }

      .session-item:last-child {
        border-bottom: 0;
      }

      .session-main {
        display: flex;
        gap: 10px;
      }

      .preview {
        width: 72px;
        height: 48px;
        border-radius: 6px;
        border: 1px solid var(--border);
        overflow: hidden;
        background: var(--bg-secondary);
        flex-shrink: 0;
      }

      .preview img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .session-title {
        font-weight: 600;
        margin-bottom: 3px;
        color: var(--text-primary);
        display: flex;
        align-items: center;
        gap: 6px;
        flex-wrap: wrap;
      }

      .severity-badge {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 9999px;
        font-size: 10px;
        font-weight: 600;
        color: #fff;
        margin-right: 4px;
      }

      .severity-badge.severity-critical {
        background: #ef4444;
      }

      .severity-badge.severity-high {
        background: #f97316;
      }

      .severity-badge.severity-medium {
        background: #eab308;
        color: #000;
      }

      .severity-badge.severity-low {
        background: #22c55e;
      }

      .severity-badge.severity-none {
        background: #6b7280;
      }

      .session-meta {
        color: var(--text-muted);
        font-size: 11px;
        line-height: 1.4;
      }

      .session-actions {
        display: flex;
        gap: 6px;
        margin-top: 8px;
      }

      .session-actions button {
        padding: 6px 12px;
        font-size: 11px;
        background: var(--bg-secondary);
        border: 1px solid var(--border);
        color: var(--text-primary);
      }

      .session-actions button:hover:not(:disabled) {
        background: var(--border);
      }

      .session-actions button[data-action="delete"] {
        background: rgba(239, 68, 68, 0.1);
        border-color: rgba(239, 68, 68, 0.3);
        color: #ef4444;
      }

      .session-actions button[data-action="delete"]:hover:not(:disabled) {
        background: rgba(239, 68, 68, 0.2);
      }

      .pager {
        margin-top: 12px;
      }

      .pager-info {
        margin-top: 6px;
        font-size: 11px;
        color: var(--text-muted);
        text-align: center;
      }

      .detail {
        margin-top: 12px;
        padding: 12px;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: var(--bg-card);
        font-size: 11px;
      }

      .detail-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }

      .workspace-panel {
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--bg-secondary);
        padding: 10px;
      }

      .workspace-panel h4 {
        margin: 0 0 8px;
        font-size: 11px;
        font-weight: 600;
        color: var(--text-primary);
      }

      .workspace-list {
        max-height: 120px;
        overflow: auto;
        font-size: 10px;
        line-height: 1.4;
        color: var(--text-secondary);
      }

      .workspace-list-item {
        border-bottom: 1px solid var(--border);
        padding: 4px 0;
      }

      .workspace-list-item:last-child {
        border-bottom: 0;
      }

      .timeline-readout {
        font-size: 10px;
        color: var(--text-muted);
        margin-top: 4px;
      }

      .bookmark-list {
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
        margin-top: 4px;
      }

      .bookmark-chip {
        width: auto;
        border: 1px solid var(--border);
        border-radius: 9999px;
        padding: 3px 8px;
        font-size: 10px;
        background: var(--bg-card);
        color: var(--text-secondary);
        cursor: pointer;
      }

      .bookmark-chip:hover {
        background: var(--bg-secondary);
        border-color: var(--primary);
      }

      .dom-preview {
        width: 100%;
        max-height: 120px;
        object-fit: contain;
        border: 1px solid var(--border);
        border-radius: 6px;
        background: var(--bg-secondary);
      }

      #replayVideo {
        width: 100%;
        border-radius: 6px;
        border: 1px solid var(--border);
        background: #000;
      }

      a {
        color: var(--primary);
        text-decoration: none;
      }

      a:hover {
        text-decoration: underline;
      }
    </style>
    <script type="module" crossorigin src="/assets/popup-BSs9FQXN.js"></script>
    <link rel="modulepreload" crossorigin href="/assets/modulepreload-polyfill-B5Qt9EMX.js">
    <link rel="modulepreload" crossorigin href="/assets/types-bvSJC4yP.js">
  </head>
  <body>
    <h1>BugCatcher</h1>
    <div id="captureState" class="capture-state">
      <div id="captureStateLabel" class="capture-state__label">Idle</div>
      <div class="capture-state__info">
        <span id="captureInfo">Ready to capture</span>
      </div>
      <div class="capture-actions">
        <button id="captureStartBtn" class="capture-start">Start Capture</button>
        <button id="captureStopBtn" class="capture-stop" style="display: none;">Stop Capture</button>
      </div>
    </div>
    <button id="screenshotCaptureButton">Capture Screenshot</button>
    <div id="screenshotPreview" class="screenshot-preview">
      <div id="screenshotPreviewMeta">No screenshot captured yet.</div>
      <img id="screenshotPreviewImage" alt="screenshot preview" style="display: none;" />
    </div>

    <button id="captureButton">Capture Current Session</button>
    <div id="status" class="status"></div>
    <div id="capturePreview" class="config" style="margin-top: 8px"></div>
    <div id="configSummary" class="config"></div>
    <div id="shortcutHint" class="config" style="margin-top: 6px"></div>
    <div class="config" style="margin-top: 8px">
      Need to configure project key? <a href="#" id="openOptions">Open options</a>
    </div>

    <div class="triage">
      <div class="config" style="margin-top: 0">Session Triage</div>
      <div class="row">
        <input id="sessionSearch" type="text" placeholder="Search title/url/error" />
      </div>
      <div class="row">
        <select id="errorFilter">
          <option value="all">All Sessions</option>
          <option value="errors">Errors Only</option>
          <option value="clean">No Errors</option>
        </select>
        <select id="sortBy">
          <option value="createdAt">Newest</option>
          <option value="url">URL</option>
          <option value="title">Title</option>
        </select>
      </div>
      <div class="row">
        <select id="sortOrder">
          <option value="desc">Descending</option>
          <option value="asc">Ascending</option>
        </select>
        <select id="pageSize">
          <option value="5">5 / page</option>
          <option value="10" selected>10 / page</option>
          <option value="20">20 / page</option>
        </select>
      </div>
      <div class="row">
        <button id="applyFilters">Apply Filters</button>
      </div>

      <div id="sessionList" class="session-list"></div>

      <div class="pager row">
        <button id="prevPage">Prev</button>
        <button id="nextPage">Next</button>
      </div>
      <div id="pagerInfo" class="pager-info"></div>
      <div id="sessionDetail" class="detail" style="display: none"></div>
    </div>
  </body>
</html>
