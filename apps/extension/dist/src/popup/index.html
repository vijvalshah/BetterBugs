<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BugCatcher</title>
    <style>
      body {
        margin: 0;
        padding: 12px;
        font-family: 'Segoe UI', Tahoma, sans-serif;
        width: 420px;
      }
      h1 {
        margin: 0 0 12px;
        font-size: 16px;
      }
      button {
        width: 100%;
        padding: 10px;
        border: 0;
        border-radius: 8px;
        background: #0f6cbd;
        color: white;
        font-weight: 600;
        cursor: pointer;
      }
      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }
      .status {
        margin-top: 10px;
        font-size: 12px;
        color: #333;
        min-height: 18px;
      }
      .config {
        margin-top: 10px;
        font-size: 12px;
        color: #444;
      }
      .triage {
        margin-top: 12px;
        padding-top: 10px;
        border-top: 1px solid #ddd;
      }
      .row {
        display: flex;
        gap: 6px;
        margin-top: 6px;
      }
      .row > * {
        flex: 1;
      }
      input,
      select {
        width: 100%;
        box-sizing: border-box;
        padding: 8px;
        border-radius: 6px;
        border: 1px solid #ccc;
        font-size: 12px;
      }
      .session-list {
        margin-top: 8px;
        max-height: 220px;
        overflow: auto;
        border: 1px solid #ddd;
        border-radius: 8px;
        background: #fafafa;
      }
      .session-item {
        padding: 8px;
        border-bottom: 1px solid #eee;
        font-size: 12px;
        border-left: 4px solid #ccc;
      }
      .session-item.severity-critical {
        border-left-color: #b71c1c;
      }
      .session-item.severity-high {
        border-left-color: #e65100;
      }
      .session-item.severity-medium {
        border-left-color: #f9a825;
      }
      .session-item.severity-low {
        border-left-color: #2e7d32;
      }
      .session-item:last-child {
        border-bottom: 0;
      }
      .session-main {
        display: flex;
        gap: 8px;
      }
      .preview {
        width: 72px;
        height: 48px;
        border-radius: 6px;
        border: 1px solid #ddd;
        overflow: hidden;
        background: linear-gradient(135deg, #eceff1, #cfd8dc);
        flex-shrink: 0;
      }
      .preview img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .session-title {
        font-weight: 600;
        margin-bottom: 2px;
      }
      .severity-badge {
        display: inline-block;
        padding: 2px 6px;
        border-radius: 10px;
        font-size: 10px;
        font-weight: 700;
        color: #fff;
        margin-right: 4px;
      }
      .severity-badge.severity-critical {
        background: #b71c1c;
      }
      .severity-badge.severity-high {
        background: #e65100;
      }
      .severity-badge.severity-medium {
        background: #f9a825;
        color: #222;
      }
      .severity-badge.severity-low {
        background: #2e7d32;
      }
      .severity-badge.severity-none {
        background: #546e7a;
      }
      .session-meta {
        color: #666;
        font-size: 11px;
      }
      .session-actions {
        display: flex;
        gap: 6px;
        margin-top: 6px;
      }
      .session-actions button {
        padding: 6px;
        font-size: 11px;
      }
      .pager {
        margin-top: 8px;
      }
      .pager-info {
        margin-top: 4px;
        font-size: 11px;
        color: #666;
      }
      .detail {
        margin-top: 8px;
        padding: 8px;
        border-radius: 8px;
        border: 1px solid #ddd;
        background: #f8f8f8;
        font-size: 11px;
      }
      .detail-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }
      .workspace-panel {
        border: 1px solid #d7d7d7;
        border-radius: 8px;
        background: #fff;
        padding: 8px;
      }
      .workspace-panel h4 {
        margin: 0 0 6px;
        font-size: 11px;
      }
      .workspace-list {
        max-height: 120px;
        overflow: auto;
        font-size: 10px;
        line-height: 1.35;
      }
      .workspace-list-item {
        border-bottom: 1px dashed #eee;
        padding: 3px 0;
      }
      .workspace-list-item:last-child {
        border-bottom: 0;
      }
      .timeline-readout {
        font-size: 10px;
        color: #444;
        margin-top: 4px;
      }
      .bookmark-list {
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
        margin-top: 4px;
      }
      .bookmark-chip {
        width: auto;
        border: 1px solid #bbb;
        border-radius: 12px;
        padding: 2px 6px;
        font-size: 10px;
        background: #fff;
        cursor: pointer;
      }
      .dom-preview {
        width: 100%;
        max-height: 120px;
        object-fit: contain;
        border: 1px solid #ddd;
        border-radius: 6px;
        background: #fafafa;
      }
      #replayVideo {
        width: 100%;
        border-radius: 6px;
        border: 1px solid #ddd;
        background: #000;
      }
      a {
        color: #0f6cbd;
      }
    </style>
    <script type="module" crossorigin src="/assets/popup-pX7yLqOh.js"></script>
    <link rel="modulepreload" crossorigin href="/assets/modulepreload-polyfill-B5Qt9EMX.js">
    <link rel="modulepreload" crossorigin href="/assets/types-DhVnsN-V.js">
  </head>
  <body>
    <h1>BugCatcher</h1>
    <button id="captureButton">Capture Current Session</button>
    <div id="status" class="status"></div>
    <div id="capturePreview" class="config" style="margin-top: 8px"></div>
    <div id="configSummary" class="config"></div>
    <div id="shortcutHint" class="config" style="margin-top: 6px"></div>
    <div class="config" style="margin-top: 8px">
      Need to configure project key? <a href="#" id="openOptions">Open options</a>
    </div>

    <div class="triage">
      <div class="config" style="margin-top: 0">Session Triage</div>
      <div class="row">
        <input id="sessionSearch" type="text" placeholder="Search title/url/error" />
      </div>
      <div class="row">
        <select id="errorFilter">
          <option value="all">All Sessions</option>
          <option value="errors">Errors Only</option>
          <option value="clean">No Errors</option>
        </select>
        <select id="sortBy">
          <option value="createdAt">Newest</option>
          <option value="url">URL</option>
          <option value="title">Title</option>
        </select>
      </div>
      <div class="row">
        <select id="sortOrder">
          <option value="desc">Descending</option>
          <option value="asc">Ascending</option>
        </select>
        <select id="pageSize">
          <option value="5">5 / page</option>
          <option value="10" selected>10 / page</option>
          <option value="20">20 / page</option>
        </select>
      </div>
      <div class="row">
        <button id="applyFilters">Apply Filters</button>
      </div>

      <div id="sessionList" class="session-list"></div>

      <div class="pager row">
        <button id="prevPage">Prev</button>
        <button id="nextPage">Next</button>
      </div>
      <div id="pagerInfo" class="pager-info"></div>
      <div id="sessionDetail" class="detail" style="display: none"></div>
    </div>
  </body>
</html>
